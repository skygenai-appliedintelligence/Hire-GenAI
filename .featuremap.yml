version: 1
repo: sample/your-repo
features:
  - name: auth
    owners: ["@sandeep"]
    paths:
      - apps/web/src/auth/**
      - packages/auth/**
    build: "pnpm -w run build:auth"
    test: "pnpm -w run test:auth"

  - name: shared-ui
    owners: ["@ui-team"]
    paths:
      - packages/ui/**
    build: "pnpm -w --filter @acme/ui build"
    test:  "pnpm -w --filter @acme/ui test"

  - name: payments
    owners: ["@payments"]
    paths:
      - services/payments/**
      - apps/web/src/payments/**
    build: "docker compose build payments && pnpm -w run build:web"
    test:  "pnpm -w run test:payments"

# Optional: cross‑feature knowledge for conflict hints
requires:
  payments: ["shared-ui"]
